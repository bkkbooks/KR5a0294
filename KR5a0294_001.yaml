body:
  text: 凡修宅次第法先修刑禍後修福德即吉先修福德後修刑禍即凶陰宅從巳起功順轉陽宅從亥起功順轉刑禍方用一百工福德方用二百工壓之即吉陽宅多修於外陰宅多修於內或者取子午分陰陽之界誤將甚也此是二氣潛通運回之數不同八卦九宫分形列象配男女之位也冬至巳聖至亥是陰陽起盛之極處不同聖人於地面上畫八卦列女男之宫宫者宅也巽為長女屬陰乾為天天為陽明矣其有長才深智慜物愛生敬曉斯門其利莫測且大犯即家破逃散小犯則失爵亡官其餘雜犯火光口舌跛蹇偏枯衰殃疾病等萬般皆有豈得輕之哉犯處遠而慢即半年一年二年三年始發犯處近而緊即七十五日四十五日或不出月即發若見此圖者自然悟會不問愚智福德自修災殃不犯官榮進達財食豐盈六畜獲安又歸天壽金玉之獻未足為珍利濟之徒莫大於此可以家藏一本用誡子孫祕而寶之可名宅鏡又宅書云拆故營新爻卜相伏移南徙北陰陽交分是和陰陽者氣也逐人得變吉凶者化也隨事能興𡉌天地運轉無窮人畜鬼神變化何準搜神記云精靈鬼魅皆化為人或有人自相感變為祅怪亦如異性之木接續而生根苗雖殊異味相雜形礙之物尚隨變通陰陽虛無豈為常定是知宅非宅氣由移來以變之又云宅以形勢為身體以泉水為血脈以土地為皮肉以草木為毛髮以舍屋為衣服以門户為冠帶若得如斯是事儼雅乃為上吉三元經云地善即苗茂宅吉即人榮又云人之福者喻如美貌之人宅之吉者如醜陋之子得好衣裳神彩尤添一半若命薄宅惡即如醜人更又衣弊如何堪也故人之居宅大須愼擇又云修來路即無不吉犯抵路未常安假如近從東來入此宅住後更修拓西方名抵路却修拓東方名來路餘方移轉及上官往來不計遠近準此為例凡人婚嫁買莊田六畜致塋域上官求利等悉宜向宅福德方往來久久吉慶若為刑禍方往來久久不利又忌龜頭廳在午地向北衝堂名曰凶亭有稍高竪屋亦不利訣云龜頭午必易主亦云妨主諸院有之亦不吉凡宅午巳東巽己來有高樓大榭皆不利宜去之吉又云凡欲修造動治須避四王神亦名帝車帝輅帝舍假如春三月東方為青帝木王寅為車卯為輅辰為舍即是正月二月三月不得東户經曰犯帝車殺父犯帝輅殺母犯帝舍殺子孫夏及秋冬三箇月倣此為忌又云每年有十二月每月有生氣死氣之位但修月生氣之位者福來集月生氣與天道月德合其吉路犯月死氣之位為有凶災正月生氣在子癸死氣在午丁二月生氣在丑艮死氣在未坤三月生氣在寅甲死氣在申庚四月生氣在卯乙死氣在酉辛五月生氣在辰巽死氣在戌乾六月生氣在巳丙死氣在亥壬七月生氣在午丁死氣在子癸八月生氣在未坤死氣在丑艮九月生氣在申庚死氣在寅甲十月生氣在酉辛死氣在卯乙十一月生氣在戌乾死氣在辰巽十二月生氣在亥壬死氣在已丙黃帝宅經卷上
