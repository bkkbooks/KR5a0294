front:
  text: 黃帝宅經卷上薑一夫宅者乃是陰陽之樞紐人倫之軌模非夫博物明賢無能悟斯道也就此五種其最要者唯有宅法而真祕術凡人所居無不在宅雖只大小不等陰陽有殊縱然客居一室之中亦有善惡大者大説小者小論犯者有災鎮而禍止猶樂病之效也故宅者人之本人以宅為家居若安即家代昌吉若不安即門族衰微墳墓川岡並同兹説上之軍國次及州郡縣邑下之村坊署柵乃至山居但人所處皆其例焉目見耳聞古制非一黃帝二宅經地典宅經三元宅經文王宅經孔子宅經宅錦宅撓宅統宅鏡天老宅經劉根宅經玄女宅經司馬天師宅經淮南子宅經王微宅經司最宅經劉晉平宅經張子亳宅經八卦宅經五兆宅經玄悟宅經六十四卦宅經右盤龍宅經李淳風宅經五姓宅經吕才宅經飛陰亂伏宅經子夏金門宅經刁曇宅經已上諸經其皆大同小異亦皆自言祕妙互推短長若不遍求即用之不足近來學者多攻五姓八宅黃道白方例皆違犯大經未免災咎所以人犯修動致令造者不居却毁陰陽而無據效豈不痛哉况先賢垂籍誡勗昭彰人自冥蒙日用而不識其象者日月乾坤寒暑雄雌晝夜陰陽等所以包羅萬象舉一千從運變無形而能化物大矣哉陰陽之理也經之陰者生化物情之母也陽者生化物情之父也作天地之祖為孕育之尊順之則亨逆之則否何異公忠受爵違命變殃者乎今採諸祕驗分為二十四路八卦九宫配女男之位宅陰陽之界考尋休咎並無出前二宅此實養生靈之聖法也二十四路者隨宅大小中院分四面作二十四路十干十二支乾艮坤巽共為二十四路是也乾將三男震坎艮悉屬於陽位即從西北乾位之震為陽明矣坤將三女巽離兊悉屬陰之位即從東南巽角順之戌為陰明矣是以陽不獨王以陰為得陽宅為宜修陰方陰不獨王以陽為得如上説亦如冬以溫暖為德夏以涼冷為德男以女為德女以男為德之義易訣云陰得陽如暑得涼五姓咸和百事俱昌所以德位高壯藹密即吉重陰重陽則凶陽宅更招東方北方陰宅更招西方南方為重也是東面為辰南西面為戌北之位斜分一條為陰陽之界凡之陽宅即有陽氣抱陰陰宅即有陰氣抱陽陰陽之宅者即龍也陽宅龍頭在亥尾在巳陰宅龍頭在巳尾在亥其狀在龍者陰龍青陽龍赤各有命坐切忌犯也凡從巽向乾從午向子從坤向艮從酉向卯從戌向辰移已上移轉及上官所住不計遠近悉入陽也從乾向巽從子向午從艮向坤從卯向酉從辰向戌移已上移轉及上官悉名入陰故福德之方勤依天道天德月德生氣到其位即修令清潔闊厚即一家獲安榮華富貴天之福德者宅之財命也財命既壯何愁不榮故須勤修再入陰入陽是名無氣三度重入陰陽謂之無魂四入謂之無魄魂魄既無即家破逃散子孫絶後也經云連犯不止滅門絶嗣此之謂也若一陰陽往來即合天道自然吉昌之象也設要重往即須逐道住四十五日七十五日往之無咎仍宜生氣福德之方始吉更犯五鬼絶命刑禍者尤不利訣云行不得度不如復故斯之謂也又云其宅乃窮急翻故宫宜拆刑禍方舍却益福德方也又云翻宅平墻可為銷殃宅之行年不利或口舌疾病等即宜翻刑禍添益福德改移墻壁即災消致其大吉昌也夫辨宅者皆取移來方位不以街北街東為陽不妨是陽之位作陰宅居之即吉街南街西為陰不妨作陽宅居之吉凡移來不勒遠近一里百里千里十步與百步同又此二宅修造唯看天道天德月德生氣到即修之不避將軍太歲豹尾黃幡黑方及音姓宜忌順陰陽二氣為正此諸神殺及五姓六十甲子皆從二氣而生列在方隅直一年公事故不為災凡諸刑殺在刑禍方者設天德月德到亦須避之若神殺在宅福德方即待天德月德生氣到其位便須修之用功多即善故不避也若不明陰陽之氣到其位便須修之用功多即善故不避也若不明氣中小數故不能制其大綱又云刑禍之方缺復荒福德之方連接長吉也又云刑禍方墻舍位宜狹薄誡之高壯也福德方及墻舍人家宜連接壯實也又云刑禍之方縮復縮猶恐災殃枉相逐福德之方拓復拓子子孫孫受榮樂刑禍之方戒侵拓也不得太縮縮即氣不足不足則損財祿福德之方宜戒侵拓也亦不得太過太過即戒福會至微不消厚福所臨也凡事足太過所侵拓之數過於本宅名曰太過又云宅有五虛令人貧耗五實令人富貴宅大人少一虛宅門大內小二虛墻院不完三虛井竈不處四虛宅地多屋少庭院廣五虛宅小人多一實宅大門小二實墻院完全三實宅小六畜多四實宅水溝東南流五實又云宅乃漸昌勿棄宫堂不衰莫移故為受殃舍居就廣未必有歡計只半造必得壽考宅不宜廣又云其田雖良薅鋤乃芳其宅雖善修移乃昌宅統之宅墓以象榮華之源得利者所作遂心失利者妄生反心墓凶宅吉子孫官祿墓吉宅凶子孫衣食不足墓宅俱吉子孫榮華墓宅俱凶子孫移鄉絶種先靈譴責地禍常併七世亡魂悲憂受苦子孫不立零落他鄉流轉如蓬客死河岸青烏子云其宅得墓二神漸護子孫祿位乃固得地得墓龍驤虎步物業滋川財集倉庫子孫忠孝天神祐助子夏云墓有四竒商角二姓丙壬乙辛宫羽徴三姓甲庚丁癸得地得宫刺史王公朱衣紫綬世貴名雄得地失宫有始無終先人受苦子孫當凶失地得宫子孫不窮雖無基業衣食過充失地失宫絶嗣無蹤行求衣食客死蒿蓬子夏云人因宅而立宅因人得存人宅相扶感通天地故不可獨信命也
