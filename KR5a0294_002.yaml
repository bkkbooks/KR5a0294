body:
  text: 黃帝宅經卷下薑二凡修築垣墻建造宅宇土氣所衝之方人家即有災殃宜依法禳之正月土氣衝丁未方二月坤三月壬亥四月辛戌五月乾六月寅甲七月癸丑八月艮九月丙巳十月辰乙十一月巽十二月申庚已上無不精詳但細看之必有災咎天門首陽宜平穩實不宜絶高壯犯之損家長大病頭項等災五月丁壬日修吉北方不用壬子丁巳日亥為朱雀龍頭父命座犯者害命坐人三月丁壬日修壬為大禍母命犯之害命坐人有飛災口舌修己亥同子為死喪龍右手長子婦命座犯之害命坐人失魂傷目水災口舌修巳壬同癸為罰獄勾陳次子婦命座犯之害命坐人口舌鬭訟等災七月丁壬日修三月亦通官羽姓不宜三月七月即吉日丑為縣獄少子婦命座犯之鬼魅盜賊火光怪異等災修巳癸同鬼門宅壅氣缺薄空荒吉犯之偏枯淋腫等災八月甲己日修吉東卯日用甲子己巳日寅為天刑龍背玄武庶養子婦長女命座犯之傷胎繫獄被盜亡敗等災六月甲己日修角姓六月凶十一月吉甲為宅形次女孫男等命座犯之害命坐人家長病頭項諸傷折等災修與寅同卯龍右脅刑獄少女孫命座犯之害命坐人火光氣滿刑傷失魂修與寅同乙螣蛇訟獄客座命犯之害命坐人妖怪死喪口舌十月己日修吉唯宜屋低小仍不得重辰為白虎龍右足主訟獄奴婢六畜命座犯之驚傷跛蹇筋急等災亦主驚恐修與乙同風門宜平缺亦明福首背向榮二宅五姓八宅並不宜高壯壅塞亦名陽極陰十一月丙辛日修吉南方不用丙辛至辛巳日巳天福宅屋亦名宅極經曰欲得職治宅極宜壯實修改吉九月丙辛修唯用功多艮丙明堂宅福安門牛倉等舍經云治明堂加官益祿大吉祥合家快活不可當修己巳同午吉昌之地龍左足經云治吉昌奴婢成行六畜良宜平實忌高及龜頭廳修與乙同丁天倉經曰財耗亡治天倉宜倉庫六畜壯厚高拓吉正月丙辛日修用功多大吉未天府高樓大舍牛羊奴婢居之大孳息倉厠利修與丁同人門龍腸宜置牛馬廄其位欲開拓壅厚亦名福囊重而兼實大吉二月乙庚日修申玉堂置牛馬屋主寶貝金玉之事壯實開拓吉經曰治玉堂財錢橫來六畜肥強庚宅德安門宜置車屋雞栖碓磑吉甚宜開拓連接壯闊淨潔吉修與申同酉大德龍左脅客舍吉經曰治大德富貴資財成萬億亦名宅德宜宅主修與申同辛金匱天井宜置門及高樓大屋經曰治金匱大富貴宜財百事吉四月乙庚日修大吉地府青龍左手主三元宜子孫恆令清淨吉經曰青龍壯高富貴雄豪外巽之位宜作園池竹簟設有舍屋宜平而薄外天德及玉堂之位宜開拓侵修令壯實大吉經曰福德之方拓復拓子子孫孫受榮樂唯不得高樓重舍外天倉與天府之位不厭高壯樓舍安門倉庫牛舍及奴婢車屋並大吉南方宜侵拓吉外龍復之位與內院並同安牛馬牢廠亦名福囊宜廣厚實吉外坤宜置馬廄吉安重滯之物及高樓等並大吉外玉堂之院宜作崇堂及郎君孫幼等院吉客廳即有公客來若高壯侵拓及有大樹重屋等招金玉寶帛主印綬喜外大德宅位宜開拓勤修泥令新淨吉及作音樂飲會之事吉宜子孫婦女等院出貴人增財富貴德望遐振外金匱青龍兩位宜作庫藏倉窖吉高樓大舍宜財帛又宜子孫出豪貴婚連帝戚常令清淨連接藂林花木藹密乾天門陰極陽首亦名背枯向榮其位舍屋連接長遠高壯闊實吉五月丁壬日修吉北方不用壬子丁巳日亥為天福龍尾宜置豬欄亦名宅極經云欲得職治宅極宜開拓吉亥東三月丁壬日修吉宫明姓即七月吉壬宅福明堂宜置高樓大舍常令清淨及集學經史亦名印綬宫宜財祿大吉修與亥同子吉昌龍左足宜置牛屋經曰奴婢成行六畜良平實吉修與亥同癸天倉立門户客舍簟厠吉經云財耗亡治天倉安六畜開拓高厚七月丁壬修日吉丑天府高樓大舍牛羊奴婢居之大孳息倉厠並吉修與癸同艮鬼門龍腹德囊宜厚實重吉缺薄即貧窮八月甲己日修日東方不用甲子日寅玉堂宜置車牛舍主寶貝金玉之事宜開拓經曰治玉堂錢財橫至六畜肥強大吉六月甲己日修吉甲宅德安門冝置碓磑開拓連接壯觀吉清淨災殃自消修巳寅同卯大德龍脅客舍經曰治大德富貴資財成萬億亦名宅主主有德望修與寅同乙金匱天井宜置高樓大舍常令清淨勤修泥尤增喜慶卯巳南十月修辰地府青龍左手三元冝子孫當冝清淨經曰青龍壯高富貴雄豪修巳一同巽風宜平穩不宜壅塞亦名陽極陰前背榮向枯宜空缺通疏大吉十一月丙辛日修吉南方不用丙子吉己朱雀龍頭父命座不宜置井犯害命坐人口舌飛禍吐血顚狂蛇畜作怪巳西九月丙辛日修吉至于地徴音並忌正三四月吉丙大禍母命不宜置門犯之害命坐人飛禍口舌修與巳同午為死喪長子婦命座犯之害命坐人失魂傷目心痛火光口舌龍右手筋急修與己同丁罰獄勾陳次子婦命犯之坐人口舌鬭訟瘡病等災午日西用正月丙辛日修吉未地五姓並吉未為縣獄少子婦命座犯之害命坐人鬼魅火瘡霹靂盜賊刀兵流血六畜傷死家破逃散修與丁同坤人門女命座不宜置馬廄犯之偏枯淋腫等此地宜荒缺低薄吉二月乙庚日修申天刑龍背庶子婦長女命座犯之失魂病脅刑傷牢獄氣滿火怪申北十二月乙庚修至酉吉商姓十二月凶四月吉庚宅刑次女長孫命座不宜置門犯之害命坐人病右脅口舌傷殘損墜修與甲同酉刑獄龍右脅少女孫命座犯者害命坐人失魂刑獄氣滿火怪修與申同辛為螣蛇訟獄客命犯之害命坐人口舌妖怪死喪災起酉北至戌四月乙庚日修戌白虎獄訟龍右足奴婢六畜命座犯之足跽跛蹇偏枯筋急修與辛同從乾順行至戌一周二十四路外乾院與同院修造開拓令壯實高岡陵大樹並吉宜家長延壽子孫榮祿不絶光映門族乾地廣闊外亥天福與宅極之鄉冝置大舍位次重疊深遠濃厚吉與宅福明堂相連接壯實子孫聰明昌盛科名印綬大富貴外天倉宜高樓重舍倉廩庫藏奴婢六畜等舍大孶息宜財帛五穀其位高潔開拓吉外天府宜闊壯子孫婦女居之大吉亦名富貴飽溢之地遷職喜萬般悉有矣絶上外龍腹福之位宜壅實如山吉遂近連接大樹長岡不厭開拓吉若低缺無屋舍即貧薄不安外玉堂宜子婦即富貴榮華子孫興達其位雄壯即官職升騰位至臺省寶帛金玉不少若陷缺荒殘即受貧薄流移他地外宅德冝作學習道藝功巧立成亦得名聞千里四方來慕亦為師統子孫居之有信懷才抱義壯勇無雙外天德金匱青龍此三神並冝濃厚實大舍高樓或有客廳卿相遊宴過往一家富貴豪盛須賴三神尤宜開拓若冷薄荒缺敗陷即貧窮也外青龍不厭清潔焚香設座延迓賔朋高道竒人自然而至安井及水瀆甚吉黃帝宅經卷下
